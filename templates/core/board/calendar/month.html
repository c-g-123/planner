<div class="month-header">
    <button
            hx-get="{% url 'core:month' year=previous_month.year month=previous_month.month %}"
            hx-target="#calendar"
    >
        <
    </button>
    <h2>{{ month.name }} {{ month.year }}</h2>
    <button
            hx-get="{% url 'core:month' year=next_month.year month=next_month.month %}"
            hx-target="#calendar"
    >
        >
    </button>
    <button
            hx-get="{% url 'core:current_month' %}"
            hx-target="#calendar"
    >
        Reset
    </button>
</div>
<div class="month">
    <table>
        <thead>
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
        </thead>
        <tbody>
            {% for week in month.data %}
                <tr>
                    {% for day in week %}
                        <td>
                            {% if day %}
                                <div>{{ day.date.day }}</div>
                                {% for item in day.items %}
                                    <button
                                            hx-get="{% url 'core:item' item_id=item.id %}"
                                            hx-target="#item-panel"
                                    >
                                        {{ item.name }}
                                    </button>
                                {% endfor %}
                                <button
                                        hx-get="{% url 'core:create_item' %}?date={{ day.date|date:'Y-m-d' }}"
                                        hx-target="#item-panel"
                                >
                                    +
                                </button>
                            {% endif %}
                        </td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
