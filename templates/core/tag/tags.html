{% extends "core/base.html" %}
{% block body %}
    <a href="{% url "core:calendar" %}">x</a>
    <ul>
        {% for tag in tags %}
            <li>
                <a style="color: {{ tag.colour }};" href="{% url "core:edit_tag" tag.id %}">{{ tag }}</a>
            </li>
        {% empty %}
            You have no tags.
        {% endfor %}
    </ul>
    <a href="{% url "core:create_tag" %}">Create tag</a>
{% endblock %}
