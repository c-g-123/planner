{% extends "core/base.html" %}
{% block body %}
    <ul>
        {% for tag in tags %}
            <li>
                <a href="{% url "core:tag" tag_id=tag.id %}">{{ tag }}</a>
            </li>
        {% empty %}
            You have no tags.
        {% endfor %}
    </ul>
    <a href="{% url "core:create_tag" %}">Create tag</a>
{% endblock %}
